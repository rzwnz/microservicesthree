services:
  # ----------------------------------------------------------------
  # File Service (Spring Boot)
  # ----------------------------------------------------------------
  file-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8087
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/file_db
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-sthree}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD must be set}
      SPRING_SQL_INIT_MODE: always
      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_DATABASE: 7
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Garage (S3-compatible)
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY:?GARAGE_ACCESS_KEY must be set}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:?GARAGE_SECRET_KEY must be set}
      GARAGE_REGION: garage
      # Storage quota (1 GB)
      STORAGE_QUOTA_DEFAULT_BYTES: 1073741824
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - file-service-net

  # ----------------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: file-service-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: file_db
      POSTGRES_USER: ${POSTGRES_USER:-sthree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sthree} -d file_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file-service-net

  # ----------------------------------------------------------------
  # Redis
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: file-service-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - file-service-net

  # ----------------------------------------------------------------
  # Kafka (KRaft mode — no ZooKeeper)
  # ----------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: file-service-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - file-service-net

  # ----------------------------------------------------------------
  # Garage (S3-compatible object storage)
  # ----------------------------------------------------------------
  garage:
    image: dxflrs/garage:v0.9.4
    container_name: file-service-garage
    restart: unless-stopped
    ports:
      - "3900:3900"   # S3 API
      - "3902:3902"   # Admin API
    volumes:
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
    networks:
      - file-service-net

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  garage-data:
  garage-meta:

networks:
  file-service-net:
    driver: bridge
