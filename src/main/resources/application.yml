# ===========================================
# File Service Application Configuration
# ===========================================

spring:
  application:
    name: file-service

  # Active Profile
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Servlet Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:55MB}

  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/file_db}
    username: ${SPRING_DATASOURCE_USERNAME:file_service_user}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      pool-name: file-service-pool

  # SQL init disabled — Flyway handles schema migrations
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}

  # Flyway Configuration
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      database: ${SPRING_REDIS_DATABASE:7}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:file-service-consumer}
      auto-offset-reset: ${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
    producer:
      acks: ${SPRING_KAFKA_PRODUCER_ACKS:all}
      retries: ${SPRING_KAFKA_PRODUCER_RETRIES:3}

# Server Configuration
server:
  port: ${SERVER_PORT:8087}

# OpenAPI / Scalar Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false          # We use Scalar instead of Swagger UI
  show-actuator: false
  default-produces-media-type: application/json

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}

# Garage (S3-Compatible) Configuration
garage:
  endpoint: ${GARAGE_ENDPOINT:http://localhost:3900}
  access-key: ${GARAGE_ACCESS_KEY}
  secret-key: ${GARAGE_SECRET_KEY}
  region: ${GARAGE_REGION:garage}
  data-bucket: ${GARAGE_DATA_BUCKET:file-service-dev-data}

# File Upload Settings
file:
  upload:
    max-size-mb: ${FILE_MAX_SIZE_MB:50}
    max-size-avatar-mb: ${FILE_MAX_SIZE_AVATAR_MB:5}
    max-size-chat-attachment-mb: ${FILE_MAX_SIZE_CHAT_ATTACHMENT_MB:10}
    allowed-image-types: ${FILE_ALLOWED_IMAGE_TYPES:image/jpeg,image/png,image/gif,image/webp}
    allowed-document-types: ${FILE_ALLOWED_DOCUMENT_TYPES:application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}

# Image Processing
image:
  thumbnail:
    enabled: ${IMAGE_THUMBNAIL_ENABLED:true}
    width: ${IMAGE_THUMBNAIL_WIDTH:200}
    height: ${IMAGE_THUMBNAIL_HEIGHT:200}
    quality: ${IMAGE_THUMBNAIL_QUALITY:80}
  avatar:
    max-width: ${IMAGE_AVATAR_MAX_WIDTH:500}
    max-height: ${IMAGE_AVATAR_MAX_HEIGHT:500}
    quality: ${IMAGE_AVATAR_QUALITY:85}
  compression:
    enabled: ${IMAGE_COMPRESSION_ENABLED:true}
    max-width: ${IMAGE_COMPRESSION_MAX_WIDTH:1920}
    max-height: ${IMAGE_COMPRESSION_MAX_HEIGHT:1080}
    quality: ${IMAGE_COMPRESSION_QUALITY:85}

# Presigned URLs
presigned-url:
  upload-expiration-minutes: ${PRESIGNED_URL_UPLOAD_EXPIRATION_MINUTES:30}
  download-expiration-minutes: ${PRESIGNED_URL_DOWNLOAD_EXPIRATION_MINUTES:60}

# Cache Settings
cache:
  file-metadata-ttl-minutes: ${CACHE_FILE_METADATA_TTL_MINUTES:60}
  presigned-url-ttl-minutes: ${CACHE_PRESIGNED_URL_TTL_MINUTES:15}

# Cleanup Settings
cleanup:
  temp-files:
    enabled: ${CLEANUP_TEMP_FILES_ENABLED:true}
    older-than-hours: ${CLEANUP_TEMP_FILES_OLDER_THAN_HOURS:24}
  orphaned-files:
    enabled: ${CLEANUP_ORPHANED_FILES_ENABLED:true}
    older-than-days: ${CLEANUP_ORPHANED_FILES_OLDER_THAN_DAYS:30}
    cron: ${CLEANUP_ORPHANED_FILES_CRON:0 0 3 * * ?}
  expired-shares:
    cron: ${CLEANUP_EXPIRED_SHARES_CRON:0 0 * * * ?}
  expired-access:
    cron: ${CLEANUP_EXPIRED_ACCESS_CRON:0 30 * * * ?}

# Storage Quota
storage:
  quota:
    default-bytes: ${STORAGE_QUOTA_DEFAULT_BYTES:1073741824}

# Service Dependencies
services:
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8080}
  auth-service-timeout-ms: ${AUTH_SERVICE_TIMEOUT_MS:5000}

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.sthree: ${LOGGING_LEVEL_COM_STHREE:DEBUG}
    software.amazon.awssdk: ${LOGGING_LEVEL_AWS:INFO}

# Kafka Topics
kafka:
  topics:
    file-uploaded: ${KAFKA_TOPIC_FILE_UPLOADED:file-uploaded}
    file-deleted: ${KAFKA_TOPIC_FILE_DELETED:file-deleted}
    file-shared: ${KAFKA_TOPIC_FILE_SHARED:file-shared}

# Virus Scanning (Optional)
virus-scan:
  enabled: ${VIRUS_SCAN_ENABLED:false}
  clamav-host: ${VIRUS_SCAN_CLAMAV_HOST:localhost}
  clamav-port: ${VIRUS_SCAN_CLAMAV_PORT:3310}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      garageStorage:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: ${RESILIENCE4J_CB_SLIDING_WINDOW_SIZE:10}
        minimum-number-of-calls: ${RESILIENCE4J_CB_MIN_CALLS:5}
        failure-rate-threshold: ${RESILIENCE4J_CB_FAILURE_RATE:50}
        wait-duration-in-open-state: ${RESILIENCE4J_CB_WAIT_DURATION:30s}
        permitted-number-of-calls-in-half-open-state: ${RESILIENCE4J_CB_HALF_OPEN_CALLS:3}
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - software.amazon.awssdk.core.exception.SdkException
          - java.io.IOException
          - java.net.ConnectException
  retry:
    instances:
      garageStorage:
        max-attempts: ${RESILIENCE4J_RETRY_MAX_ATTEMPTS:3}
        wait-duration: ${RESILIENCE4J_RETRY_WAIT_DURATION:500ms}
        enable-exponential-backoff: true
        exponential-backoff-multiplier: ${RESILIENCE4J_RETRY_BACKOFF_MULTIPLIER:2}
        retry-exceptions:
          - software.amazon.awssdk.core.exception.SdkException
          - java.io.IOException
          - java.net.ConnectException
