apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: file-service
  namespace: sthree-services
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - file.example.com        # replace with your DNS name
      secretName: file-service-tls
  rules:
    - host: file.example.com          # replace with your DNS name
      http:
        paths:
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: file-service
                port:
                  number: 8087
