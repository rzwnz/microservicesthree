apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: sthree-services
  labels:
    app: file-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: file-service
          image: sthree/file-service:1.0.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: SERVER_PORT
              value: "8087"
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: file-service-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: file-service-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: file-service-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            # Garage/S3 storage (see README for details)
            - name: GARAGE_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            - name: GARAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-credentials
                  key: accessKey
            - name: GARAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-credentials
                  key: secretKey
            # Redis cache
            - name: SPRING_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: file-service-config
                  key: SPRING_REDIS_HOST
            - name: SPRING_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: file-service-config
                  key: SPRING_REDIS_PORT
            # Kafka
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: file-service-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: file-service-pdb
  namespace: sthree-services
  labels:
    app: file-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: file-service
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: sthree-services
  labels:
    app: file-service
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  selector:
    app: file-service
  ports:
    - port: 8087
      targetPort: 8087
      protocol: TCP
      name: http
